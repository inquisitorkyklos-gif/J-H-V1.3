# Netlify Configuration File for J&H Services LLC
# Supports Vite production build and fluid Single-Page Application (SPA) routing.

[build]
  command = "npm run build"
  publish = "dist"

# Route all API requests to the Netlify serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA Fallback: Directs all other subroutes to index.html so React handles routing on client side
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
